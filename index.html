<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Character Companion</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>D&D 5e Character Companion</h1>
        <p>Gestiona los héroes y aventureros de tu campaña</p>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Crear Nuevo Personaje</h2>
            <form id="character-form" novalidate>
                
                <div class="form-group">
                    <label for="char-name">Nombre del Aventurero:</label>
                    <input type="text" id="char-name" placeholder="Ej. Aragorn, Jester...">
                    <span class="error-message" id="error-name"></span>
                </div>

                <div class="form-group">
                    <label for="char-race">Raza:</label>
                    <select id="char-race">
                        <option value="">-- Selecciona una Raza --</option>
                        <option value="Humano">Humano</option>
                        <option value="Elfo">Elfo</option>
                        <option value="Enano">Enano</option>
                        <option value="Mediano">Mediano</option>
                        <option value="Tiflin">Tiflin</option>
                    </select>
                    <span class="error-message" id="error-race"></span>
                </div>

                <div class="form-group">
                    <label for="char-class">Clase:</label>
                    <select id="char-class">
                        <option value="">-- Selecciona una Clase --</option>
                        <option value="Guerrero">Guerrero</option>
                        <option value="Mago">Mago</option>
                        <option value="Pícaro">Pícaro</option>
                        <option value="Clérigo">Clérigo</option>
                        <option value="Bardo">Bardo</option>
                    </select>
                    <span class="error-message" id="error-class"></span>
                </div>

                <div class="form-group">
                    <label for="char-level">Nivel (1 - 20):</label>
                    <input type="number" id="char-level" min="1" max="20" placeholder="1">
                    <span class="error-message" id="error-level"></span>
                </div>

                <div class="form-group">
                    <label for="char-bio">Historia / Notas Cortas:</label>
                    <textarea id="char-bio" rows="3" placeholder="Breve descripción del personaje..."></textarea>
                    <span class="error-message" id="error-bio"></span>
                </div>

                <button type="submit" id="btn-submit">Forjar Personaje</button>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Aventureros Registrados</h2>
                <button id="btn-clear-all" class="btn-secondary">Vaciar Taberna</button>
            </div>
            <div id="characters-container" class="cards-grid">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Panel de Control Frontend para Campañas de Rol</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
